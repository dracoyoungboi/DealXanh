<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Không tìm thấy trang — DealXanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .wrap{text-align:center;max-width:480px;width:100%}
        .icon-circle{width:96px;height:96px;border-radius:50%;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
        .icon-circle svg{width:48px;height:48px;color:#3b82f6}
        .code{font-size:80px;font-weight:800;color:#3b82f6;line-height:1;margin-bottom:8px}
        h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:10px}
        p{font-size:15px;color:#666;line-height:1.6;margin-bottom:32px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#0d5c2e;color:#fff;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s}
        .btn:hover{background:#08421f;transform:translateY(-1px)}
        .btn-outline{background:transparent;border:1.5px solid #0d5c2e;color:#0d5c2e;margin-left:12px}
        .btn-outline:hover{background:#0d5c2e;color:#fff}
    </style>
</head>
<body>
<div class="wrap">
    <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
    </div>
    <div class="code">404</div>
    <h1>Trang không tồn tại</h1>
    <p th:text="${errorMessage} ?: 'Trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.'" >
        Trang bạn đang tìm kiếm không tồn tại hoặc đã bị di chuyển.
    </p>
    <a href="/" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Về trang chủ
    </a>
    <a href="javascript:history.back()" class="btn btn-outline">Quay lại</a>
</div>
</body>
</html>
