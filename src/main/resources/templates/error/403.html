<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối — DealXanh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .wrap{text-align:center;max-width:480px;width:100%}
        .icon-circle{width:96px;height:96px;border-radius:50%;background:rgba(245,158,11,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
        .icon-circle svg{width:48px;height:48px;color:#f59e0b}
        .code{font-size:80px;font-weight:800;color:#f59e0b;line-height:1;margin-bottom:8px}
        h1{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:10px}
        p{font-size:15px;color:#666;line-height:1.6;margin-bottom:32px}
        .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:#0d5c2e;color:#fff;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;transition:all .2s}
        .btn:hover{background:#08421f;transform:translateY(-1px)}
        .btn-outline{background:transparent;border:1.5px solid #0d5c2e;color:#0d5c2e;margin-left:12px}
        .btn-outline:hover{background:#0d5c2e;color:#fff}
    </style>
</head>
<body>
<div class="wrap">
    <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
    </div>
    <div class="code">403</div>
    <h1>Truy cập bị từ chối</h1>
    <p th:text="${errorMessage} ?: 'Bạn không có quyền truy cập trang này. Vui lòng đăng nhập với tài khoản phù hợp.'" >
        Bạn không có quyền truy cập trang này. Vui lòng đăng nhập với tài khoản phù hợp.
    </p>
    <a href="/login" class="btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Đăng nhập
    </a>
    <a href="/" class="btn btn-outline">Về trang chủ</a>
</div>
</body>
</html>
