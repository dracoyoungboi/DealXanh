<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  common/buyer/header.html
-->
<body th:fragment="header">
<header class="mobile-header">
    <div class="mobile-header__logo">
        <a th:href="@{/}">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span class="mobile-header__brand">DealXanh</span>
        </a>
    </div>
    <div class="mobile-header__actions">
        <button class="mobile-header__button" id="search-toggle" aria-label="Tìm kiếm">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </button>
        <button class="mobile-header__button" id="notification-toggle" aria-label="Thông báo" style="position:relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="notification-badge" id="notif-badge" th:if="${notifCount != null and notifCount > 0}" th:text="${notifCount}">0</span>
        </button>
    </div>
</header>
<!-- Search Overlay Container -->
<div th:replace="common/buyer/search-overlay :: searchOverlay"></div>
</body>
</html>
