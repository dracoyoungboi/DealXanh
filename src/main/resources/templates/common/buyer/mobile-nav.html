<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  common/buyer/mobile-nav.html
-->
<body th:fragment="mobileNav">
<nav class="mobile-nav" id="mobile-nav">
    <ul class="mobile-nav__list">
        <li>
            <a th:href="@{/}" class="mobile-nav__link" th:classappend="${activeNav == 'home'} ? ' mobile-nav__link--active' : ''">
                <svg class="mobile-nav__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Trang chủ</span>
            </a>
        </li>
        <li>
            <a th:href="@{/buyer/deal-map}" class="mobile-nav__link" th:classappend="${activeNav == 'map'} ? ' mobile-nav__link--active' : ''">
                <svg class="mobile-nav__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
                    <line x1="8" y1="2" x2="8" y2="18"></line>
                    <line x1="16" y1="6" x2="16" y2="22"></line>
                </svg>
                <span>Bản đồ</span>
            </a>
        </li>
        <li>
            <a th:href="@{/buyer/cart}" class="mobile-nav__link" th:classappend="${activeNav == 'cart'} ? ' mobile-nav__link--active' : ''" style="position:relative">
                <svg class="mobile-nav__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span>Giỏ hàng</span>
                <span id="mobile-nav-cart-badge" class="mobile-nav__cart__badge" th:if="${cartItemCount != null and cartItemCount > 0}" th:text="${cartItemCount}">0</span>
            </a>
        </li>
        <li>
            <a th:href="@{/buyer/orders}" class="mobile-nav__link" th:classappend="${activeNav == 'orders'} ? ' mobile-nav__link--active' : ''">
                <svg class="mobile-nav__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <span>Đơn hàng</span>
            </a>
        </li>
        <li>
             <a th:href="${#authorization.expression('isAuthenticated()') ? '/auth/role-select' : '/login'}" class="mobile-nav__link" th:classappend="${activeNav == 'account'} ? ' mobile-nav__link--active' : ''">
                <svg class="mobile-nav__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Tài khoản</span>
            </a>
        </li>
    </ul>
</nav>
</body>
</html>
