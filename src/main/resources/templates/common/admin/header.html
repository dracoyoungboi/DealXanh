<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  common/admin/header.html
-->
<body th:fragment="header">
  <header class="topbar">
      <div class="topbar__title" th:text="${pageTitle != null ? pageTitle : 'Admin Portal'}">Admin Dashboard</div>
      <div class="topbar__right">
          <!-- Notification Button -->
          <button class="topbar-btn" id="notification-toggle" style="position:relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
              </svg>
              <span class="notification-badge" id="notif-badge" style="display:none">0</span>
          </button>

          <!-- User Profile / Avatar -->
          <button class="topbar-btn user-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
              </svg>
          </button>
      </div>
  </header>
</body>
</html>
