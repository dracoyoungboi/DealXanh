<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  common/auth/back-header.html
  Thanh quay lại dùng trên góc trái màn hình + Logo (nếu không dùng split-screen)
-->
<body th:fragment="backHeader">
    <div class="auth-top-nav" style="position: absolute; top: 24px; left: 24px; display: flex; align-items: center; gap: 20px; z-index: 10;">
        <a th:href="@{/login}" th:if="${showBack == null or showBack}" style="display:flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:14px;font-weight:600;text-decoration:none;transition:all 0.2s;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span th:text="${backLabel != null ? backLabel : 'Quay lại'}">Quay lại</span>
        </a>
    </div>
</body>
</html>
